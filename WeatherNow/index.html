<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WeatherNow Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<body>

  <div class="container">

    <!-- Header -->
    <header>
      <h1>🌤 WeatherNow</h1>
      <p class="subtitle">Real-Time Weather Dashboard</p>
    </header>

    <!-- Search bar -->
    <div class="search-bar">
      <input type="text" id="city-input" placeholder="Enter city name..." />
      <button id="search-btn">Search</button>
    </div>

    <!-- Error message (hidden by default) -->
    <div id="error-msg" class="hidden">
      <span id="error-text">Something went wrong.</span>
    </div>

    <!-- Current weather card -->
    <section class="section-title">Current Weather</section>
    <div id="current-card">
      <div class="current-left">
        <div id="city-name" class="skeleton"></div>
        <div id="weather-desc" class="skeleton"></div>
        <div id="temperature" class="skeleton"></div>
        <div class="stats-row">
          <div class="stat">
            <span class="stat-label">Humidity</span>
            <span id="humidity" class="stat-value skeleton"></span>
          </div>
          <div class="stat">
            <span class="stat-label">Wind Speed</span>
            <span id="wind-speed" class="stat-value skeleton"></span>
          </div>
        </div>
      </div>
      <div class="current-right">
        <div id="weather-icon" class="skeleton icon-skel"></div>
        <div id="local-time" class="skeleton"></div>
      </div>
    </div>

    <!-- 7-day forecast -->
    <section class="section-title">7-Day Forecast</section>
    <div id="forecast-grid">
      <!-- Skeleton forecast cards are generated by JS -->
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
