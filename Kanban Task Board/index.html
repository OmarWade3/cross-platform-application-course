<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Task Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Kanban Board <span id="task-counter">0</span></h1>
        <div class="controls">
            <label for="filter-priority">Filter:</label>
            <select id="filter-priority">
                <option value="all">All</option>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
            </select>
        </div>
    </header>

    <main class="board">
        <section id="todo" class="column">
            <h2>To Do</h2>
            <ul class="task-list"></ul>
            <button class="add-btn" data-column="todo">+ Add Task</button>
        </section>

        <section id="inprogress" class="column">
            <h2>In Progress</h2>
            <ul class="task-list"></ul>
            <button class="add-btn" data-column="inprogress">+ Add Task</button>
        </section>

        <section id="done" class="column">
            <h2>Done</h2>
            <ul class="task-list"></ul>
            <button class="add-btn" data-column="done">+ Add Task</button>
            <button id="clear-done">Clear All Done</button>
        </section>
    </main>

    <div id="modal-overlay" class="is-hidden">
        <div class="modal">
            <h3 id="modal-title-text">Add New Task</h3>
            <input type="text" id="task-title" placeholder="Title">
            <textarea id="task-desc" placeholder="Description"></textarea>
            <select id="task-priority">
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
            </select>
            <input type="date" id="task-date">
            <div class="modal-actions">
                <button id="cancel-task">Cancel</button>
                <button id="save-task">Save Task</button>
            </div>
        </div>
    </div>

    <script src="taskmanager.js"></script>
</body>
</html>
